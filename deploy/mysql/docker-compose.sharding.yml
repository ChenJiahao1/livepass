services:
  mysql-order-db-0:
    image: mysql:8.4
    command:
      - mysqld
      - --max_connections=320
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: livepass_user
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - mysql_order_db_0_data:/var/lib/mysql
    ports:
      - "3317:3306"

  mysql-order-db-1:
    image: mysql:8.4
    command:
      - mysqld
      - --max_connections=320
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: livepass_user
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - mysql_order_db_1_data:/var/lib/mysql
    ports:
      - "3318:3306"

volumes:
  mysql_order_db_0_data:
  mysql_order_db_1_data:
