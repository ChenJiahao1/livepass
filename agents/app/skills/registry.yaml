version: v1

providers:
  activity:
    provider_type: python_mcp
    server_name: activity
    toolset: activity
    transport: stdio
  order:
    provider_type: go_mcp
    server_name: order
    toolset: order
    transport: http
  handoff:
    provider_type: python_mcp
    server_name: handoff
    toolset: handoff
    transport: stdio

skills:
  order.read:
    version: v1
    domain: order
    agent_type: order
    skill_path: skills/order-read/SKILL.md
    access_mode: read
    provider: order
    tools: [list_user_orders, get_order_detail_for_service]
    required_slots: []
    max_steps: 3
    termination_rule: got_order_read_result_or_fail
    fallback_policy: return_parent
    audit_tags: [order, read]
  refund.read:
    version: v1
    domain: refund
    agent_type: refund
    skill_path: skills/refund-read/SKILL.md
    access_mode: read
    provider: order
    tools: [list_user_orders, get_order_detail_for_service, preview_refund_order]
    required_slots: []
    max_steps: 4
    termination_rule: got_refund_read_result_or_fail
    fallback_policy: return_parent
    audit_tags: [refund, read]
  refund.write:
    version: v1
    domain: refund
    agent_type: refund
    skill_path: skills/refund-write/SKILL.md
    access_mode: write
    provider: order
    tools: [refund_order]
    required_slots: [order_id]
    max_steps: 1
    termination_rule: got_refund_submit_result_or_fail
    fallback_policy: handoff
    audit_tags: [refund, write]
  handoff.write:
    version: v1
    domain: handoff
    agent_type: handoff
    skill_path: skills/handoff-write/SKILL.md
    access_mode: write
    provider: handoff
    tools: [create_handoff_ticket]
    required_slots: []
    max_steps: 1
    termination_rule: got_ticket_or_fail
    fallback_policy: handoff
    audit_tags: [handoff, write]
  activity.search_program:
    version: v1
    domain: activity
    agent_type: activity
    skill_path: skills/activity-search-program/SKILL.md
    access_mode: read
    provider: activity
    tools: [search_programs]
    required_slots: [program_id]
    max_steps: 2
    termination_rule: got_program_detail_or_fail
    fallback_policy: return_parent
    audit_tags: [activity, search]
