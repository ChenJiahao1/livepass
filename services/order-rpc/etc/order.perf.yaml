Name: order.rpc
ListenOn: 0.0.0.0:8082
Timeout: 5500
Prometheus:
  Host: 0.0.0.0
  Port: 9103
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: order.rpc
MySQL:
  DataSource: root:123456@tcp(127.0.0.1:3306)/livepass_order?parseTime=true
  MaxOpenConns: 24
  MaxIdleConns: 8
  ConnMaxLifetime: 5m
  ConnMaxIdleTime: 2m
Sharding:
  Mode: shard_only
  Shards:
    order-db-0:
      DataSource: root:123456@tcp(127.0.0.1:3306)/livepass_order?parseTime=true
      MaxOpenConns: 24
      MaxIdleConns: 8
      ConnMaxLifetime: 5m
      ConnMaxIdleTime: 2m
    order-db-1:
      DataSource: root:123456@tcp(127.0.0.1:3306)/livepass_order?parseTime=true
      MaxOpenConns: 24
      MaxIdleConns: 8
      ConnMaxLifetime: 5m
      ConnMaxIdleTime: 2m
  RouteMap:
    File: order.route-map.yaml
StoreRedis:
  Host: 127.0.0.1:6379
  Type: node
ProgramRpc:
  Timeout: 4000
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: program.rpc
PayRpc:
  Timeout: 4000
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: pay.rpc
UserRpc:
  Timeout: 4000
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: user.rpc
Order:
  CloseAfter: 15m
RushOrder:
  Enabled: true
  TokenSecret: rush-order-local-secret
  TokenTTL: 24h
  InFlightTTL: 30s
  FinalStateTTL: 30m
RepeatGuard:
  Prefix: /livepass/repeat-guard/order-create/
  SessionTTL: 10
  LockAcquireTimeout: 200ms
Kafka:
  Brokers:
    - 127.0.0.1:9094
  TopicOrderCreate: ticketing.attempt.command.v1
  ConsumerGroup: livepass-ticketing-attempt
  TopicPartitions: 5
  ConsumerWorkers: 5
  ProducerTimeout: 3s
  RetryBackoff: 1s
Xid:
  Provider: static
  NodeId: 256
