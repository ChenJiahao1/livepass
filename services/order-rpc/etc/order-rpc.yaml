Name: order.rpc
ListenOn: 0.0.0.0:8082
Timeout: 5500
Prometheus:
  Host: 0.0.0.0
  Port: 9103
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: order.rpc
MySQL:
  DataSource: root:123456@tcp(127.0.0.1:3306)/damai_order?parseTime=true
  MaxOpenConns: 24
  MaxIdleConns: 8
  ConnMaxLifetime: 3m
  ConnMaxIdleTime: 1m
Sharding:
  Mode: shard_only
  Shards:
    order-db-0:
      DataSource: root:123456@tcp(127.0.0.1:3306)/damai_order?parseTime=true
      MaxOpenConns: 24
      MaxIdleConns: 8
      ConnMaxLifetime: 3m
      ConnMaxIdleTime: 1m
    order-db-1:
      DataSource: root:123456@tcp(127.0.0.1:3306)/damai_order?parseTime=true
      MaxOpenConns: 24
      MaxIdleConns: 8
      ConnMaxLifetime: 3m
      ConnMaxIdleTime: 1m
  RouteMap:
    File: order-rpc.route-map.yaml
StoreRedis:
  Host: 127.0.0.1:6379
  Type: node
ProgramRpc:
  Timeout: 4000
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: program.rpc
PayRpc:
  Timeout: 4000
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: pay.rpc
UserRpc:
  Timeout: 4000
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: user.rpc
Order:
  CloseAfter: 15m
AsyncClose:
  Enable: true
  Queue: order_close
  EnqueueTimeout: 500ms
  UniqueTTL: 30m
  MaxRetry: 8
  Redis:
    Host: 127.0.0.1:6379
    Type: node
RepeatGuard:
  Prefix: /damai-go/repeat-guard/order-create/
  SessionTTL: 10
  LockAcquireTimeout: 200ms
Kafka:
  Brokers:
    - 127.0.0.1:9094
  TopicOrderCreate: order.create.command.v1
  ConsumerGroup: damai-go-order-create
  TopicPartitions: 5
  ConsumerWorkers: 1
  # 对齐 Java 开源版语义：超过该延迟的创建消息按废单处理，consumer 释放锁座且不补单。
  # 这不是“消息绝不丢失”的配置项，而是“超时废单回滚”阈值。
  MaxMessageDelay: 5s
  ProducerTimeout: 3s
  RetryBackoff: 1s
