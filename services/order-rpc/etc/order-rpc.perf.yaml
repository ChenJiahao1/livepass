Name: order.rpc
ListenOn: 0.0.0.0:8082
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: order.rpc
MySQL:
  DataSource: root:123456@tcp(127.0.0.1:3306)/damai_order?parseTime=true
StoreRedis:
  Host: 127.0.0.1:6379
  Type: node
ProgramRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: program.rpc
PayRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: pay.rpc
UserRpc:
  Etcd:
    Hosts:
      - 127.0.0.1:2379
    Key: user.rpc
Order:
  CloseAfter: 15m
RepeatGuard:
  Prefix: /damai-go/repeat-guard/order-create/
  SessionTTL: 10
  LockAcquireTimeout: 200ms
Kafka:
  Brokers:
    - 127.0.0.1:9094
  TopicOrderCreate: order.create.command.v1
  ConsumerGroup: damai-go-order-create
  TopicPartitions: 4
  ConsumerWorkers: 4
  MaxMessageDelay: 60s
  ProducerTimeout: 3s
  RetryBackoff: 1s
