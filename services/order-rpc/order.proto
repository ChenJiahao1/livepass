syntax = "proto3";

package order;

option go_package = "./pb";

message BoolResp {
  bool success = 1;
}

message CreatePurchaseTokenReq {
  int64 userId = 1;
  int64 showTimeId = 2;
  int64 ticketCategoryId = 3;
  repeated int64 ticketUserIds = 4;
  string distributionMode = 5;
  string takeTicketMode = 6;
}

message CreatePurchaseTokenResp {
  string purchaseToken = 1;
}

message CreateOrderReq {
  int64 userId = 1;
  string purchaseToken = 2;
}

message CreateOrderResp {
  int64 orderNumber = 1;
}

message PollOrderProgressReq {
  int64 userId = 1;
  int64 orderNumber = 2;
}

message PollOrderProgressResp {
  int64 orderNumber = 1;
  int64 orderStatus = 2;
  bool done = 3;
  string reasonCode = 4;
}

message ListOrdersReq {
  int64 userId = 1;
  int64 pageNumber = 2;
  int64 pageSize = 3;
  int64 orderStatus = 4;
}

message OrderListInfo {
  int64 orderNumber = 1;
  int64 programId = 2;
  int64 showTimeId = 3;
  string programTitle = 4;
  string programItemPicture = 5;
  string programPlace = 6;
  string programShowTime = 7;
  int64 ticketCount = 8;
  int64 orderPrice = 9;
  int64 orderStatus = 10;
  string orderExpireTime = 11;
  string createOrderTime = 12;
  string cancelOrderTime = 13;
}

message ListOrdersResp {
  int64 pageNum = 1;
  int64 pageSize = 2;
  int64 totalSize = 3;
  repeated OrderListInfo list = 4;
}

message GetOrderReq {
  int64 userId = 1;
  int64 orderNumber = 2;
}

message GetOrderServiceViewReq {
  int64 userId = 1;
  int64 orderNumber = 2;
}

message GetOrderCacheReq {
  int64 orderNumber = 1;
}

message GetOrderCacheResp {
  string cache = 1;
}

message OrderServiceViewResp {
  int64 orderNumber = 1;
  int64 programId = 2;
  int64 showTimeId = 3;
  int64 orderStatus = 4;
  int64 payStatus = 5;
  int64 ticketStatus = 6;
  string programTitle = 7;
  string programShowTime = 8;
  int64 ticketCount = 9;
  int64 orderPrice = 10;
  bool canRefund = 11;
  string refundBlockedReason = 12;
}

message OrderTicketInfo {
  int64 ticketUserId = 1;
  string ticketUserName = 2;
  string ticketUserIdNumber = 3;
  int64 ticketCategoryId = 4;
  string ticketCategoryName = 5;
  int64 ticketPrice = 6;
  int64 seatId = 7;
  int64 seatRow = 8;
  int64 seatCol = 9;
  int64 seatPrice = 10;
}

message OrderDetailInfo {
  int64 orderNumber = 1;
  int64 programId = 2;
  int64 showTimeId = 3;
  string programTitle = 4;
  string programItemPicture = 5;
  string programPlace = 6;
  string programShowTime = 7;
  int64 programPermitChooseSeat = 8;
  int64 userId = 9;
  string distributionMode = 10;
  string takeTicketMode = 11;
  int64 ticketCount = 12;
  int64 orderPrice = 13;
  int64 orderStatus = 14;
  string freezeToken = 15;
  string orderExpireTime = 16;
  string createOrderTime = 17;
  string cancelOrderTime = 18;
  repeated OrderTicketInfo orderTicketInfoVoList = 19;
}

message CancelOrderReq {
  int64 userId = 1;
  int64 orderNumber = 2;
}

message PayOrderReq {
  int64 userId = 1;
  int64 orderNumber = 2;
  string subject = 3;
  string channel = 4;
}

message PayOrderResp {
  int64 orderNumber = 1;
  int64 orderStatus = 2;
  int64 payBillNo = 3;
  int64 payStatus = 4;
  string payTime = 5;
}

message PayCheckReq {
  int64 userId = 1;
  int64 orderNumber = 2;
}

message PayCheckResp {
  int64 orderNumber = 1;
  int64 orderStatus = 2;
  int64 payBillNo = 3;
  int64 payStatus = 4;
  string payTime = 5;
}

message RefundOrderReq {
  int64 userId = 1;
  int64 orderNumber = 2;
  string reason = 3;
}

message PreviewRefundOrderReq {
  int64 userId = 1;
  int64 orderNumber = 2;
}

message PreviewRefundOrderResp {
  int64 orderNumber = 1;
  bool allowRefund = 2;
  int64 refundAmount = 3;
  int64 refundPercent = 4;
  string rejectReason = 5;
}

message RefundOrderResp {
  int64 orderNumber = 1;
  int64 orderStatus = 2;
  int64 refundAmount = 3;
  int64 refundPercent = 4;
  int64 refundBillNo = 5;
  string refundTime = 6;
}

message CloseExpiredOrderReq {
  int64 orderNumber = 1;
}

message CloseExpiredOrdersReq {
  int64 limit = 1;
  int64 logicSlotStart = 2;
  int64 logicSlotCount = 3;
}

message CloseExpiredOrdersResp {
  int64 closedCount = 1;
}

message CountActiveTicketsByUserShowTimeReq {
  int64 userId = 1;
  int64 showTimeId = 2;
}

message CountActiveTicketsByUserShowTimeResp {
  int64 activeTicketCount = 1;
}

message PrimeRushRuntimeReq {
  int64 showTimeId = 1;
}

service OrderRpc {
  rpc CreatePurchaseToken(CreatePurchaseTokenReq) returns (CreatePurchaseTokenResp);
  rpc CreateOrder(CreateOrderReq) returns (CreateOrderResp);
  rpc PollOrderProgress(PollOrderProgressReq) returns (PollOrderProgressResp);
  rpc ListOrders(ListOrdersReq) returns (ListOrdersResp);
  rpc GetOrder(GetOrderReq) returns (OrderDetailInfo);
  rpc GetOrderCache(GetOrderCacheReq) returns (GetOrderCacheResp);
  rpc GetOrderServiceView(GetOrderServiceViewReq) returns (OrderServiceViewResp);
  rpc CancelOrder(CancelOrderReq) returns (BoolResp);
  rpc PayOrder(PayOrderReq) returns (PayOrderResp);
  rpc PayCheck(PayCheckReq) returns (PayCheckResp);
  rpc PreviewRefundOrder(PreviewRefundOrderReq) returns (PreviewRefundOrderResp);
  rpc RefundOrder(RefundOrderReq) returns (RefundOrderResp);
  rpc CloseExpiredOrder(CloseExpiredOrderReq) returns (BoolResp);
  rpc CloseExpiredOrders(CloseExpiredOrdersReq) returns (CloseExpiredOrdersResp);
  rpc CountActiveTicketsByUserShowTime(CountActiveTicketsByUserShowTimeReq) returns (CountActiveTicketsByUserShowTimeResp);
  rpc PrimeRushRuntime(PrimeRushRuntimeReq) returns (BoolResp);
}
