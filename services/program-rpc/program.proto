syntax = "proto3";

package program;

option go_package = "./pb";

message Empty {}

message BoolResp {
  bool success = 1;
}

message IdResp {
  int64 id = 1;
}

message ListHomeProgramsReq {
  int64 areaId = 1;
  repeated int64 parentProgramCategoryIds = 2;
}

message PageProgramsReq {
  int64 pageNumber = 1;
  int64 pageSize = 2;
  int64 areaId = 3;
  int64 parentProgramCategoryId = 4;
  int64 programCategoryId = 5;
  int64 timeType = 6;
  string startDateTime = 7;
  string endDateTime = 8;
  int64 type = 9;
}

message GetProgramDetailViewReq {
  int64 id = 1;
}

message GetProgramPreorderReq {
  int64 showTimeId = 1;
}

message ListProgramShowTimesForRushReq {
  int64 programId = 1;
}

message ProgramInvalidReq {
  int64 id = 1;
}

message ProgramResetReq {
  int64 programId = 1;
}

message ProgramCategoryTypeReq {
  int64 type = 1;
}

message ParentProgramCategoryReq {
  int64 parentProgramCategoryId = 1;
}

message ProgramCategoryBatchItem {
  int64 parentId = 1;
  string name = 2;
  int64 type = 3;
}

message ProgramCategoryBatchSaveReq {
  repeated ProgramCategoryBatchItem list = 1;
}

message CreateProgramReq {
  int64 programGroupId = 1;
  int64 prime = 2;
  int64 areaId = 3;
  int64 programCategoryId = 4;
  int64 parentProgramCategoryId = 5;
  string title = 6;
  string actor = 7;
  string place = 8;
  string itemPicture = 9;
  int64 preSell = 10;
  string preSellInstruction = 11;
  string importantNotice = 12;
  string detail = 13;
  int64 perOrderLimitPurchaseCount = 14;
  int64 perAccountLimitPurchaseCount = 15;
  string refundTicketRule = 16;
  string deliveryInstruction = 17;
  string entryRule = 18;
  string childPurchase = 19;
  string invoiceSpecification = 20;
  string realTicketPurchaseRule = 21;
  string abnormalOrderDescription = 22;
  string kindReminder = 23;
  string performanceDuration = 24;
  string entryTime = 25;
  int64 minPerformanceCount = 26;
  string mainActor = 27;
  string minPerformanceDuration = 28;
  string prohibitedItem = 29;
  string depositSpecification = 30;
  int64 totalCount = 31;
  int64 permitRefund = 32;
  string refundExplain = 33;
  string refundRuleJson = 34;
  int64 relNameTicketEntrance = 35;
  string relNameTicketEntranceExplain = 36;
  int64 permitChooseSeat = 37;
  string chooseSeatExplain = 38;
  int64 electronicDeliveryTicket = 39;
  string electronicDeliveryTicketExplain = 40;
  int64 electronicInvoice = 41;
  string electronicInvoiceExplain = 42;
  int64 highHeat = 43;
  int64 programStatus = 44;
  string issueTime = 45;
  string rushSaleOpenTime = 46;
  string rushSaleEndTime = 47;
  int64 status = 48;
}

message CreateProgramResp {
  int64 id = 1;
}

message UpdateProgramReq {
  int64 id = 1;
  int64 programGroupId = 2;
  int64 prime = 3;
  int64 areaId = 4;
  int64 programCategoryId = 5;
  int64 parentProgramCategoryId = 6;
  string title = 7;
  string actor = 8;
  string place = 9;
  string itemPicture = 10;
  int64 preSell = 11;
  string preSellInstruction = 12;
  string importantNotice = 13;
  string detail = 14;
  int64 perOrderLimitPurchaseCount = 15;
  int64 perAccountLimitPurchaseCount = 16;
  string refundTicketRule = 17;
  string deliveryInstruction = 18;
  string entryRule = 19;
  string childPurchase = 20;
  string invoiceSpecification = 21;
  string realTicketPurchaseRule = 22;
  string abnormalOrderDescription = 23;
  string kindReminder = 24;
  string performanceDuration = 25;
  string entryTime = 26;
  int64 minPerformanceCount = 27;
  string mainActor = 28;
  string minPerformanceDuration = 29;
  string prohibitedItem = 30;
  string depositSpecification = 31;
  int64 totalCount = 32;
  int64 permitRefund = 33;
  string refundExplain = 34;
  string refundRuleJson = 35;
  int64 relNameTicketEntrance = 36;
  string relNameTicketEntranceExplain = 37;
  int64 permitChooseSeat = 38;
  string chooseSeatExplain = 39;
  int64 electronicDeliveryTicket = 40;
  string electronicDeliveryTicketExplain = 41;
  int64 electronicInvoice = 42;
  string electronicInvoiceExplain = 43;
  int64 highHeat = 44;
  int64 programStatus = 45;
  string issueTime = 46;
  string rushSaleOpenTime = 47;
  string rushSaleEndTime = 48;
  int64 status = 49;
}

message ProgramShowTimeAddReq {
  int64 programId = 1;
  string showTime = 2;
  string showDayTime = 3;
  string showWeekTime = 4;
  string showEndTime = 5;
}

message UpdateProgramShowTimeReq {
  int64 id = 1;
  string showWeekTime = 2;
  string showEndTime = 3;
}

message ListTicketCategoriesByProgramReq {
  int64 programId = 1;
}

message TicketCategoryAddReq {
  int64 programId = 1;
  string introduce = 2;
  int64 price = 3;
  int64 totalNumber = 4;
  int64 remainNumber = 5;
}

message TicketCategoryReq {
  int64 id = 1;
}

message ProgramCategoryInfo {
  int64 id = 1;
  int64 parentId = 2;
  string name = 3;
  int64 type = 4;
}

message ProgramSimpleInfo {
  int64 programId = 1;
  int64 areaId = 2;
  string areaIdName = 3;
}

message ProgramGroupInfo {
  int64 id = 1;
  repeated ProgramSimpleInfo programSimpleInfoVoList = 2;
  string recentShowTime = 3;
}

message ProgramHomeSection {
  string categoryName = 1;
  int64 categoryId = 2;
  repeated ProgramListInfo programListVoList = 3;
}

message TicketCategoryInfo {
  int64 id = 1;
  string introduce = 2;
  int64 price = 3;
}

message SeatInfo {
  int64 seatId = 1;
  int64 ticketCategoryId = 2;
  int64 rowCode = 3;
  int64 colCode = 4;
  int64 price = 5;
}

message SeatAddReq {
  int64 programId = 1;
  int64 ticketCategoryId = 2;
  int64 rowCode = 3;
  int64 colCode = 4;
  int64 seatType = 5;
  int64 price = 6;
  int64 seatStatus = 7;
}

message SeatBatchRelateInfoAddReq {
  int64 ticketCategoryId = 1;
  int64 price = 2;
  int64 count = 3;
}

message SeatBatchAddReq {
  int64 programId = 1;
  repeated SeatBatchRelateInfoAddReq seatBatchRelateInfoAddDtoList = 2;
}

message SeatListReq {
  int64 programId = 1;
}

message PriceSeatGroup {
  string price = 1;
  repeated SeatInfo seats = 2;
}

message SeatRelateInfo {
  int64 programId = 1;
  string place = 2;
  string showTime = 3;
  string showWeekTime = 4;
  repeated string priceList = 5;
  repeated PriceSeatGroup priceSeatGroupList = 6;
}

message TicketCategoryDetailInfo {
  int64 programId = 1;
  string introduce = 2;
  int64 price = 3;
  int64 totalNumber = 4;
  int64 remainNumber = 5;
}

message ProgramPreorderTicketCategoryInfo {
  int64 id = 1;
  string introduce = 2;
  int64 price = 3;
  int64 totalNumber = 4;
  int64 remainNumber = 5;
  int64 admissionQuota = 6;
}

message ProgramShowTimeForRushInfo {
  int64 showTimeId = 1;
  string rushSaleOpenTime = 2;
  int64 inventoryPreheatStatus = 3;
}

message ProgramCategoryListResp {
  repeated ProgramCategoryInfo list = 1;
}

message ProgramListInfo {
  int64 id = 1;
  string title = 2;
  string actor = 3;
  string place = 4;
  string itemPicture = 5;
  int64 areaId = 6;
  string areaName = 7;
  int64 programCategoryId = 8;
  string programCategoryName = 9;
  int64 parentProgramCategoryId = 10;
  string parentProgramCategoryName = 11;
  string showTime = 12;
  string showDayTime = 13;
  string showWeekTime = 14;
  int64 minPrice = 15;
  int64 maxPrice = 16;
  int64 esId = 17;
}

message ProgramHomeListResp {
  repeated ProgramHomeSection sections = 1;
}

message ProgramPageResp {
  int64 pageNum = 1;
  int64 pageSize = 2;
  int64 totalSize = 3;
  repeated ProgramListInfo list = 4;
}

message TicketCategoryDetailListResp {
  repeated TicketCategoryDetailInfo list = 1;
}

message ListProgramShowTimesForRushResp {
  repeated ProgramShowTimeForRushInfo list = 1;
}

message ProgramPreorderInfo {
  int64 programId = 1;
  int64 showTimeId = 2;
  int64 programGroupId = 3;
  string title = 4;
  string actor = 5;
  string place = 6;
  string itemPicture = 7;
  string showTime = 8;
  string showDayTime = 9;
  string showWeekTime = 10;
  string rushSaleOpenTime = 11;
  string rushSaleEndTime = 12;
  int64 perOrderLimitPurchaseCount = 13;
  int64 perAccountLimitPurchaseCount = 14;
  int64 permitChooseSeat = 15;
  string chooseSeatExplain = 16;
  repeated ProgramPreorderTicketCategoryInfo ticketCategoryVoList = 17;
}

message AutoAssignAndFreezeSeatsReq {
  int64 showTimeId = 1;
  int64 ticketCategoryId = 2;
  int64 count = 3;
  string freezeToken = 4;
  string freezeExpireTime = 5;
}

message AutoAssignAndFreezeSeatsResp {
  string freezeToken = 1;
  string expireTime = 2;
  repeated SeatInfo seats = 3;
}

message ReleaseSeatFreezeReq {
  string freezeToken = 1;
  string releaseReason = 2;
}

message ReleaseSeatFreezeResp {
  bool success = 1;
}

message ConfirmSeatFreezeReq {
  string freezeToken = 1;
}

message ConfirmSeatFreezeResp {
  bool success = 1;
}

message EvaluateRefundRuleReq {
  int64 showTimeId = 1;
  int64 orderAmount = 2;
}

message EvaluateRefundRuleResp {
  bool allowRefund = 1;
  int64 refundPercent = 2;
  int64 refundAmount = 3;
  string rejectReason = 4;
}

message ReleaseSoldSeatsReq {
  int64 showTimeId = 1;
  repeated int64 seatIds = 2;
  string requestNo = 3;
}

message ReleaseSoldSeatsResp {
  bool success = 1;
}

message ProgramDetailViewInfo {
  int64 id = 1;
  int64 programGroupId = 2;
  int64 prime = 3;
  ProgramGroupInfo programGroupVo = 4;
  string title = 5;
  string actor = 6;
  string place = 7;
  string itemPicture = 8;
  int64 preSell = 9;
  string preSellInstruction = 10;
  string importantNotice = 11;
  int64 areaId = 12;
  string areaName = 13;
  int64 programCategoryId = 14;
  string programCategoryName = 15;
  int64 parentProgramCategoryId = 16;
  string parentProgramCategoryName = 17;
  string detail = 18;
  int64 perOrderLimitPurchaseCount = 19;
  int64 perAccountLimitPurchaseCount = 20;
  string refundTicketRule = 21;
  string deliveryInstruction = 22;
  string entryRule = 23;
  string childPurchase = 24;
  string invoiceSpecification = 25;
  string realTicketPurchaseRule = 26;
  string abnormalOrderDescription = 27;
  string kindReminder = 28;
  string performanceDuration = 29;
  string entryTime = 30;
  int64 minPerformanceCount = 31;
  string mainActor = 32;
  string minPerformanceDuration = 33;
  string prohibitedItem = 34;
  string depositSpecification = 35;
  int64 totalCount = 36;
  int64 permitRefund = 37;
  string refundExplain = 38;
  int64 relNameTicketEntrance = 39;
  string relNameTicketEntranceExplain = 40;
  int64 permitChooseSeat = 41;
  string chooseSeatExplain = 42;
  int64 electronicDeliveryTicket = 43;
  string electronicDeliveryTicketExplain = 44;
  int64 electronicInvoice = 45;
  string electronicInvoiceExplain = 46;
  int64 highHeat = 47;
  int64 programStatus = 48;
  string issueTime = 49;
  string showTime = 50;
  string showDayTime = 51;
  string showWeekTime = 52;
  repeated TicketCategoryInfo ticketCategoryVoList = 53;
  string rushSaleOpenTime = 54;
  string rushSaleEndTime = 55;
  int64 inventoryPreheatStatus = 56;
}

message PrimeSeatLedgerReq {
  int64 showTimeId = 1;
}

service ProgramRpc {
  rpc CreateProgram(CreateProgramReq) returns (CreateProgramResp);
  rpc UpdateProgram(UpdateProgramReq) returns (BoolResp);
  rpc InvalidProgram(ProgramInvalidReq) returns (BoolResp);
  rpc ResetProgram(ProgramResetReq) returns (BoolResp);
  rpc ListProgramCategories(Empty) returns (ProgramCategoryListResp);
  rpc ListProgramCategoriesByType(ProgramCategoryTypeReq) returns (ProgramCategoryListResp);
  rpc ListProgramCategoriesByParent(ParentProgramCategoryReq) returns (ProgramCategoryListResp);
  rpc BatchCreateProgramCategories(ProgramCategoryBatchSaveReq) returns (BoolResp);
  rpc ListHomePrograms(ListHomeProgramsReq) returns (ProgramHomeListResp);
  rpc PagePrograms(PageProgramsReq) returns (ProgramPageResp);
  rpc GetProgramDetailView(GetProgramDetailViewReq) returns (ProgramDetailViewInfo);
  rpc GetProgramPreorder(GetProgramPreorderReq) returns (ProgramPreorderInfo);
  rpc ListProgramShowTimesForRush(ListProgramShowTimesForRushReq) returns (ListProgramShowTimesForRushResp);
  rpc CreateProgramShowTime(ProgramShowTimeAddReq) returns (IdResp);
  rpc UpdateProgramShowTime(UpdateProgramShowTimeReq) returns (BoolResp);
  rpc CreateTicketCategory(TicketCategoryAddReq) returns (IdResp);
  rpc GetTicketCategoryDetail(TicketCategoryReq) returns (TicketCategoryDetailInfo);
  rpc ListTicketCategoriesByProgram(ListTicketCategoriesByProgramReq) returns (TicketCategoryDetailListResp);
  rpc CreateSeat(SeatAddReq) returns (IdResp);
  rpc BatchCreateSeats(SeatBatchAddReq) returns (BoolResp);
  rpc GetSeatRelateInfo(SeatListReq) returns (SeatRelateInfo);
  rpc AutoAssignAndFreezeSeats(AutoAssignAndFreezeSeatsReq) returns (AutoAssignAndFreezeSeatsResp);
  rpc ReleaseSeatFreeze(ReleaseSeatFreezeReq) returns (ReleaseSeatFreezeResp);
  rpc ConfirmSeatFreeze(ConfirmSeatFreezeReq) returns (ConfirmSeatFreezeResp);
  rpc EvaluateRefundRule(EvaluateRefundRuleReq) returns (EvaluateRefundRuleResp);
  rpc ReleaseSoldSeats(ReleaseSoldSeatsReq) returns (ReleaseSoldSeatsResp);
  rpc PrimeSeatLedger(PrimeSeatLedgerReq) returns (BoolResp);
}
