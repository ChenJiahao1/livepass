Name: gateway-api
Host: 0.0.0.0
Port: 8081
Timeout: 7000
Telemetry:
  Name: gateway-api
  Batcher: otlphttp
  Endpoint: localhost:4318
  OtlpHttpPath: /v1/traces
Prometheus:
  Host: 0.0.0.0
  Port: 9101
Auth:
  AccessSecret: local-user-secret-0001
InternalAuth:
  Secret: local-gateway-internal-secret
Cors:
  AllowOrigins:
    - http://localhost:5173
    - http://127.0.0.1:5173
  AllowHeaders:
    - Content-Type
    - Origin
    - Authorization
  AllowCredentials: true
Upstreams:
  - Name: user-api
    Http:
      Target: 127.0.0.1:8888
      Timeout: 3000
    Mappings:
      - Method: post
        Path: /user/register
      - Method: post
        Path: /user/exist
      - Method: post
        Path: /user/login
      - Method: post
        Path: /user/get/id
      - Method: post
        Path: /user/get/mobile
      - Method: post
        Path: /user/logout
      - Method: post
        Path: /user/update
      - Method: post
        Path: /user/update/email
      - Method: post
        Path: /user/update/mobile
      - Method: post
        Path: /user/update/password
      - Method: post
        Path: /user/authentication
      - Method: post
        Path: /user/get/user/ticket/list
      - Method: post
        Path: /ticket/user/list
      - Method: post
        Path: /ticket/user/add
      - Method: post
        Path: /ticket/user/delete
  - Name: program-api
    Http:
      Target: 127.0.0.1:8889
      Timeout: 3000
    Mappings:
      - Method: post
        Path: /program/category/select/all
      - Method: post
        Path: /program/detail
      - Method: post
        Path: /program/home/list
      - Method: post
        Path: /program/page
      - Method: post
        Path: /program/preorder/detail
      - Method: post
        Path: /ticket/category/select/list/by/program
  - Name: order-api
    Http:
      Target: 127.0.0.1:8890
      Timeout: 6000
    Mappings:
      - Method: post
        Path: /order/account/order/count
      - Method: post
        Path: /order/cancel
      - Method: post
        Path: /order/create
      - Method: post
        Path: /order/poll
      - Method: post
        Path: /order/purchase/token
      - Method: post
        Path: /order/get
      - Method: post
        Path: /order/get/cache
      - Method: post
        Path: /order/pay
      - Method: post
        Path: /order/pay/check
      - Method: post
        Path: /order/refund
      - Method: post
        Path: /order/select/list
  - Name: pay-api
    Http:
      Target: 127.0.0.1:8892
      Timeout: 3000
    Mappings:
      - Method: post
        Path: /pay/common/pay
      - Method: post
        Path: /pay/detail
      - Method: post
        Path: /pay/refund
  - Name: agents-api
    Http:
      Target: 127.0.0.1:8891
      Timeout: 3000
    Mappings:
      - Method: post
        Path: /agent/threads
      - Method: get
        Path: /agent/threads
      - Method: get
        Path: /agent/threads/:threadId
      - Method: patch
        Path: /agent/threads/:threadId
      - Method: get
        Path: /agent/threads/:threadId/messages
      - Method: get
        Path: /agent/runs/:runId
      - Method: post
        Path: /agent/runs
      - Method: get
        Path: /agent/runs/:runId/events
      - Method: post
        Path: /agent/runs/:runId/tool-calls/:toolCallId/resume
      - Method: post
        Path: /agent/runs/:runId/cancel
