Name: user.rpc
ListenOn: 0.0.0.0:8080
Timeout: 4500
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: user.rpc
MySQL:
  DataSource: root:123456@tcp(127.0.0.1:3306)/damai_user?parseTime=true
  MaxOpenConns: 64
  MaxIdleConns: 16
  ConnMaxLifetime: 3m
  ConnMaxIdleTime: 1m
StoreRedis:
  Host: 127.0.0.1:6379
  Type: node
UserAuth:
  TokenExpire: 2h
  LoginFailLimit: 5
  ChannelMap:
    "0001": local-user-secret-0001
