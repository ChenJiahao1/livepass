Name: user.rpc
ListenOn: 0.0.0.0:8080
Etcd:
  Hosts:
    - 127.0.0.1:2379
  Key: user.rpc
MySQL:
  DataSource: root:123456@tcp(127.0.0.1:3306)/damai_user?parseTime=true
Redis:
  Host: 127.0.0.1:6379
  Type: node
UserAuth:
  TokenExpire: 2h
  LoginFailLimit: 5
  ChannelMap:
    "0001": local-user-secret-0001
